<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>UAKEEN</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="/">
<link rel="preconnect" href="/api">
<link rel="stylesheet" href="style.css">
<script>(function(){if(window.location.hostname.includes('ngrok')&&!window.location.search.includes('ngrok-skip-browser-warning')){let u=window.location.href;u+=(u.includes('?')?'&':'?')+'ngrok-skip-browser-warning=true';window.location.replace(u);return}if(window.Telegram?.WebApp){window.Telegram.WebApp.expand();window.Telegram.WebApp.ready()}})();</script>
</head>
<body>
<div id="app">
<header><h1>📦 <span class="highlight">Mahsulotlar</span> kategoriyasi</h1><span id="total-count">0 ta mahsulot</span></header>
<div class="tabs">
<button class="tab active" data-tab="categories"><span>📦 Mahsulotlar</span></button>
<button class="tab" data-tab="news"><span>📰 Yangiliklar</span></button>
<button class="tab" data-tab="employees"><span>👥 Xodimlar</span></button>
<button class="tab" data-tab="contacts"><span>📞 Kontaktlar</span></button>
</div>
<div class="search-container" id="search-container"><input type="text" id="search-input" placeholder="Kategoriyalarni qidirish..." oninput="renderCategories(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"></div>
<div id="categories-list"></div>
<div id="news-section" style="display:none">
<div class="news-tabs">
<button class="news-tab active" data-news-tab="all" onclick="switchNewsTab('all')"><span>📋 Barchasi</span></button>
<button class="news-tab" data-news-tab="photo" onclick="switchNewsTab('photo')"><span>🖼️ Rasmlar</span></button>
<button class="news-tab" data-news-tab="video" onclick="switchNewsTab('video')"><span>🎬 Videolar</span></button>
</div>
<div id="news-grid"></div>
</div>
<div id="employees-section" style="display:none"><div id="employees-grid"></div></div>
<div id="contacts-section" style="display:none"><div id="contacts-content"></div></div>
</div>
<script src="script.js" defer></script>
</body>
</html>
